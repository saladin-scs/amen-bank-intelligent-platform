name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, auth-service, banking-service, ai-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint
        working-directory: backend/${{ matrix.service }}
        run: ruff check app/ || true

      - name: Test
        working-directory: backend/${{ matrix.service }}
        run: pytest tests/ -v --tb=short || true

  ai-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preprocessing deps
        working-directory: ai-engine/preprocessing
        run: pip install -r requirements.txt

      - name: Run preprocessing tests
        working-directory: ai-engine/preprocessing
        run: pytest test_pipeline.py -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
